<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oriane Cosson</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- BG PATTERN global -->
<div class="bg-pattern">
  <img src="assets/svg/bg-pattern.svg" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;" alt="">
</div>

<nav>
  <span class="nav-logo" id="nav-logo" onclick="showPage('home')"></span>
  <ul class="nav-links">
    <li><a onclick="showPage('home')" id="nav-home" class="active"><span class="nav-dot"></span>Accueil</a></li>
    <li><a onclick="showPage('portfolio')" id="nav-portfolio"><span class="nav-dot"></span>Portfolio</a></li>
    <li><a onclick="showPage('about')" id="nav-about"><span class="nav-dot"></span>À propos</a></li>
  </ul>
</nav>

<!-- PAGE 1 -->
<div class="page active" id="page-home">
  <section class="hero">
    <div class="hero-left">
      <p class="hero-tag" id="hero-tag"></p>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-sub" id="hero-sub"></p>
      <div class="hero-ctas">
        <button class="btn-p" onclick="showPage('portfolio')">Voir les réalisations</button>
        <button class="btn-s" onclick="document.getElementById('ca').scrollIntoView({behavior:'smooth'})">Me contacter</button>
      </div>
    </div>
    <div class="hero-right" style="display:flex;align-items:center;justify-content:center;padding:3rem;position:relative;">
      <img src="assets/img/offers/offers.png" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0.5;" onerror="this.style.display='none'">
      <img src="assets/svg/hero-illustration.svg" alt="" style="width:100%;max-width:460px;opacity:0.85;position:relative;z-index:1;">
    </div>
  </section>

  <section class="section">
    <p class="s-label">// offres</p>
    <h2 class="s-title">Trois façons de travailler ensemble</h2>
    <div class="offres" id="offres"></div>
  </section>

  <section class="contact-s" id="ca">
    <div>
      <h2 id="contact-title"></h2>
      <p id="contact-text"></p>
      <a class="contact-link" id="contact-linkedin" href="#" target="_blank">→ LinkedIn</a>
    </div>
    <form class="cform" onsubmit="return false">
      <div class="fg">
        <label>Nom</label>
        <input type="text" placeholder="Votre nom">
      </div>
      <div class="fg">
        <label>Email</label>
        <input type="email" placeholder="votre@email.com">
      </div>
      <div class="fg">
        <label>Type de mission</label>
        <select id="mission-select"></select>
      </div>
      <div class="fg">
        <label>Message</label>
        <textarea rows="3" placeholder="Décrivez votre projet…"></textarea>
      </div>
      <button class="btn-send">Envoyer</button>
    </form>
  </section>

  <footer>
    <span id="footer-copy-home"></span>
    <span class="fdot">·</span>
    <span id="footer-role-home"></span>
  </footer>
</div>

<!-- PAGE 2 PORTFOLIO -->
<div class="page" id="page-portfolio">
  <div class="port-header">
    <h1>Réalisations</h1>
    <small>★ projet d'étude</small>
  </div>
  <div class="filters">
    <button class="fb active" onclick="fp('all',this)">Tous</button>
    <button class="fb" onclick="fp('ar',this)">AR</button>
    <button class="fb" onclick="fp('vr',this)">VR</button>
    <button class="fb" onclick="fp('3d',this)">3D</button>
    <button class="fb" onclick="fp('ia',this)">IA / NLP</button>
    <button class="fb" onclick="fp('salon',this)">Salon</button>
    <button class="fb" onclick="fp('mediation',this)">Médiation</button>
    <button class="fb" onclick="fp('education',this)">Éducation</button>
  </div>
  <div class="pgrid" id="pgrid"></div>
  <footer>
    <span id="footer-copy-portfolio"></span>
    <span class="fdot">·</span>
    <span id="footer-role-portfolio"></span>
  </footer>
</div>

<!-- PAGE 3 À PROPOS -->
<div class="page" id="page-about">
  <div class="about-hero">
    <div class="about-left">
      <h1 id="about-hero-title"></h1>
      <p id="about-hero-sub"></p>
    </div>
    <div class="about-right">
      <div style="position:relative;width:100%;max-width:300px;aspect-ratio:4/5;clip-path:inset(0);border:2px solid #23262B;transform:translateZ(0);will-change:transform;">
        <img src="assets/svg/about/about-visual.svg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">
        <img src="assets/img/about/oriane_lowscale.png" alt="Oriane Cosson" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;" onerror="this.style.display='none'">
      </div>
    </div>
  </div>

  <div class="about-content">
    <div class="about-grid">
      <div class="about-bio">
        <h2>Parcours</h2>
        <div id="about-bio"></div>
        <div class="skills" id="skills"></div>
      </div>
      <div>
        <h2 style="font-size:1.4rem;font-weight:500;margin-bottom:1.2rem;">Valeurs & engagements</h2>
        <p id="values-intro" style="font-size:0.82rem;line-height:1.85;color:var(--muted);margin-bottom:1.5rem;font-weight:300;"></p>
        <div class="val-cards" id="val-cards"></div>
      </div>
    </div>
  </div>

  <div class="maker-s">
    <h2>Projets personnels</h2>
    <p class="msub">Fabrication, arts visuels, making — ce qui nourrit le reste.</p>
    <div class="mgrid" id="mgrid"></div>
  </div>

  <footer>
    <span id="footer-copy-about"></span>
    <span class="fdot">·</span>
    <span id="footer-role-about"></span>
  </footer>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>

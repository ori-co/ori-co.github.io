<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oriane Cosson</title>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@300;400;500;600&family=DM+Mono:wght@300;400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>

<!-- BG PATTERN global -->
<div class="bg-pattern">
  <img src="assets/svg/bg-pattern.svg" style="position:fixed;inset:0;width:100%;height:100%;object-fit:cover;" alt="">
</div>

<nav>
  <span class="nav-logo" id="nav-logo" onclick="showPage('home')"></span>
  <ul class="nav-links">
    <li><a onclick="showPage('home')" id="nav-home" class="active"><span class="nav-dot"></span><span id="nav-label-home"></span></a></li>
    <li><a onclick="showPage('portfolio')" id="nav-portfolio"><span class="nav-dot"></span><span id="nav-label-portfolio"></span></a></li>
    <li><a onclick="showPage('about')" id="nav-about"><span class="nav-dot"></span><span id="nav-label-about"></span></a></li>
  </ul>
  <button class="lang-toggle" id="lang-toggle" onclick="toggleLang()"></button>
</nav>

<!-- PAGE 1 -->
<div class="page active" id="page-home">
  <section class="hero">
    <div class="hero-left">
      <p class="hero-name" id="hero-name"></p>
      <p class="hero-tag" id="hero-tag"></p>
      <h1 class="hero-title" id="hero-title"></h1>
      <p class="hero-sub" id="hero-sub"></p>
      <div class="hero-ctas">
        <button class="btn-p" id="btn-portfolio" onclick="showPage('portfolio')"></button>
        <button class="btn-s" id="btn-contact" onclick="document.getElementById('ca').scrollIntoView({behavior:'smooth'})"></button>
      </div>
    </div>
    <div class="hero-right" style="display:flex;align-items:center;justify-content:center;padding:3rem;position:relative;">
      <img src="assets/img/offers/offers.png" alt="" style="position:absolute;inset:0;width:100%;height:100%;object-fit:contain;opacity:0.5;" onerror="this.style.display='none'">
      <img src="assets/svg/hero-illustration.svg" alt="" style="width:100%;max-width:460px;opacity:0.85;position:relative;z-index:1;">
    </div>
  </section>

  <section class="section">
    <p class="s-label" id="label-offres"></p>
    <h2 class="s-title" id="title-offres"></h2>
    <div class="offres" id="offres"></div>
  </section>

  <section class="contact-s" id="ca">
    <div>
      <h2 id="contact-title"></h2>
      <p id="contact-text"></p>
      <a class="contact-link" id="contact-linkedin" href="#" target="_blank">→ LinkedIn</a>
    </div>
    <form class="cform" onsubmit="return false">
      <div class="fg">
        <label id="label-name"></label>
        <input type="text" id="input-name">
      </div>
      <div class="fg">
        <label id="label-email"></label>
        <input type="email" placeholder="votre@email.com">
      </div>
      <div class="fg">
        <label id="label-mission"></label>
        <select id="mission-select"></select>
      </div>
      <div class="fg">
        <label id="label-message"></label>
        <textarea id="textarea-msg" rows="3"></textarea>
      </div>
      <button class="btn-send" id="btn-send"></button>
    </form>
  </section>

  <footer>
    <span id="footer-copy-home"></span>
    <span class="fdot">·</span>
    <span id="footer-role-home"></span>
  </footer>
</div>

<!-- PAGE 2 PORTFOLIO -->
<div class="page" id="page-portfolio">
  <div class="port-header">
    <div>
      <p class="hero-name" id="port-name"></p>
      <h1 id="title-portfolio"></h1>
    </div>
  </div>
  <div class="filters">
    <button class="fb active" id="fb-all"       onclick="fp('all',this)"></button>
    <button class="fb"        id="fb-ar"        onclick="fp('ar',this)"></button>
    <button class="fb"        id="fb-vr"        onclick="fp('vr',this)"></button>
    <button class="fb"        id="fb-3d"        onclick="fp('3d',this)"></button>
    <button class="fb"        id="fb-ia"        onclick="fp('ia',this)"></button>
    <button class="fb"        id="fb-salon"     onclick="fp('salon',this)"></button>
    <button class="fb"        id="fb-mediation" onclick="fp('mediation',this)"></button>
    <button class="fb"        id="fb-education" onclick="fp('education',this)"></button>
  </div>
  <div class="pgrid" id="pgrid"></div>
  <footer>
    <span id="footer-copy-portfolio"></span>
    <span class="fdot">·</span>
    <span id="footer-role-portfolio"></span>
  </footer>
</div>

<!-- PAGE 3 À PROPOS -->
<div class="page" id="page-about">

  <div class="about-header">
    <div class="about-header-left">
      <p class="hero-name" id="about-name"></p>
      <div class="about-header-left-bottom">
        <div class="about-portrait">
          <img src="assets/svg/about/about-visual.svg" alt="" style="width:100%;height:100%;object-fit:cover;display:block;">
          <img src="assets/img/about/oriane_lowscale.png" alt="Oriane Cosson" style="position:absolute;inset:0;width:100%;height:100%;object-fit:cover;object-position:center top;" onerror="this.style.display='none'">
        </div>
        <h1 id="about-hero-title"></h1>
      </div>
    </div>
    <div class="about-header-sub" id="about-hero-sub"></div>
  </div>

  <div class="about-content">
    <div class="parcours-grid">
      <div>
        <p class="s-label" id="label-stack"></p>
        <div class="skills" id="skills"></div>
      </div>
      <div>
        <p class="s-label" id="label-experience"></p>
        <div id="about-timeline"></div>
      </div>
    </div>
  </div>

  <div class="maker-s">
    <p class="s-label" id="label-perso"></p>
    <div class="maker-layout">
      <div class="maker-left">
        <div class="val-cards" id="val-cards"></div>
      </div>
      <div class="maker-right">
        <div class="mgrid" id="mgrid"></div>
      </div>
    </div>
  </div>

  <footer>
    <span id="footer-copy-about"></span>
    <span class="fdot">·</span>
    <span id="footer-role-about"></span>
  </footer>
</div>

<!-- Modal projet -->
<div id="proj-modal" class="pmodal-overlay" onclick="if(event.target===this)closeProjModal()">
  <div class="pmodal">
    <button class="pmodal-close" onclick="closeProjModal()">×</button>
    <div class="pmodal-header">
      <p class="pmodal-year" id="pmodal-year"></p>
      <h2 class="pmodal-name" id="pmodal-name"></h2>
      <div class="pmodal-tags" id="pmodal-tags"></div>
    </div>
    <div class="pmodal-gallery" id="pmodal-gallery"></div>
    <div class="pmodal-video" id="pmodal-video"></div>
    <div class="pmodal-desc" id="pmodal-desc"></div>
    <div class="pmodal-tech" id="pmodal-tech"></div>
    <div class="pmodal-links" id="pmodal-links"></div>
  </div>
</div>

<!-- Lightbox -->
<div id="lightbox" class="lightbox" onclick="closeLightbox()">
  <button class="lb-nav lb-prev" onclick="event.stopPropagation();lbNav(-1)">&#8249;</button>
  <img id="lb-img" src="" alt="">
  <button class="lb-nav lb-next" onclick="event.stopPropagation();lbNav(1)">&#8250;</button>
</div>

<script src="assets/js/main.js"></script>
</body>
</html>

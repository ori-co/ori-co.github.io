<!doctype html><html lang="fr"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1,user-scalable=no"><meta name="description" content="Carte de visite AR — Oriane Cosson · Ingénieure Innovation"><title>AR — Oriane Cosson</title><meta property="og:title" content="Expérience AR — Oriane Cosson"><meta property="og:description" content="Scannez la carte de visite pour découvrir les offres en réalité augmentée."><script async src="https://cdn.jsdelivr.net/npm/@8thwall/engine-binary@1/xrweb.js?allowedDevices=mobile&slam=false"></script><script async src="https://cdn.jsdelivr.net/npm/@8thwall/landing-page@1/dist/index.js"></script><script src="./external/runtime/runtime.js"></script><style>@import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;600&family=DM+Mono:ital,wght@0,400;0,500&display=swap');

    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #1C1E22;
      --text:   #DDDBD6;
      --ocre:   #C8A86C;
      --cyan:   #5BC8C0;
      --violet: #9B8EC4;
    }

    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--bg);
      font-family: 'DM Mono', monospace;
      color: var(--text);
      -webkit-tap-highlight-color: transparent;
    }

    /* ── Scanning overlay ───────────────────────────── */
    #scanning-overlay {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: flex-end;
      padding-bottom: 80px;
      pointer-events: none;
      z-index: 10;
      transition: opacity 0.6s ease;
    }
    #scanning-overlay.hidden { opacity: 0; }

    #scanning-ring {
      width: 72px; height: 72px;
      border: 1.5px solid rgba(91, 200, 192, 0.5);
      border-radius: 50%;
      margin-bottom: 20px;
      animation: pulse 2.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.3; transform: scale(0.88); }
      50%       { opacity: 1;   transform: scale(1.12); }
    }

    #scanning-hint {
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(221, 219, 214, 0.6);
      text-align: center;
      line-height: 1.7;
    }

    /* ── Back button ────────────────────────────────── */
    #back-btn {
      position: fixed; top: 20px; left: 20px;
      width: 40px; height: 40px;
      background: rgba(28, 30, 34, 0.72);
      border: 1px solid rgba(221, 219, 214, 0.12);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; z-index: 30;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }
    #back-btn svg {
      width: 16px; height: 16px;
      fill: none; stroke: var(--text); stroke-width: 2;
      stroke-linecap: round; stroke-linejoin: round;
    }

    /* ── Platform tap hint (appears after tracking) ── */
    #tap-hint {
      position: fixed; top: 20px; left: 50%; transform: translateX(-50%);
      font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase;
      color: rgba(221, 219, 214, 0.5);
      background: rgba(28, 30, 34, 0.6);
      padding: 6px 14px; border-radius: 20px;
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      z-index: 10;
      opacity: 0; transition: opacity 0.5s;
      pointer-events: none;
      white-space: nowrap;
    }
    #tap-hint.visible { opacity: 1; }

    /* ── CTA panel ──────────────────────────────────── */
    #cta-panel {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 28px 20px 44px;
      background: linear-gradient(to top,
        rgba(28, 30, 34, 0.97) 0%,
        rgba(28, 30, 34, 0.6) 70%,
        transparent 100%);
      display: flex; flex-direction: column; gap: 10px;
      transform: translateY(100%);
      transition: transform 0.55s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 20;
    }
    #cta-panel.visible { transform: translateY(0); }

    #cta-tagline {
      font-family: 'Syne', sans-serif;
      font-weight: 400;
      font-size: 14px;
      color: var(--text);
      text-align: center;
      margin-bottom: 6px;
      opacity: 0.85;
    }

    .cta-btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      padding: 15px 20px;
      border-radius: 8px;
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      text-decoration: none;
      cursor: pointer;
      border: none;
      width: 100%;
      transition: opacity 0.15s, transform 0.15s;
      -webkit-tap-highlight-color: transparent;
    }
    .cta-btn:active { opacity: 0.75; transform: scale(0.98); }

    #btn-linkedin {
      background: var(--cyan);
      color: var(--bg);
      font-weight: 500;
    }
    #btn-site {
      background: rgba(221, 219, 214, 0.08);
      color: var(--text);
      border: 1px solid rgba(221, 219, 214, 0.18);
    }</style></head><body><div id="scanning-overlay"><div id="scanning-ring"></div><p id="scanning-hint">Pointez la face B<br>de la carte de visite</p></div><div id="tap-hint">Touchez une plateforme</div><button id="back-btn" aria-label="Retour" onclick="history.length > 1 ? history.back() : (window.location.href='/')"><svg viewBox="0 0 24 24"><polyline points="15 18 9 12 15 6"/></svg></button><div id="cta-panel" role="region" aria-label="Actions"><p id="cta-tagline">Expériences interactives & immersives</p><a id="btn-linkedin" class="cta-btn" href="https://www.linkedin.com/in/orianecosson/" target="_blank" rel="noopener noreferrer">Se connecter </a><button id="btn-site" class="cta-btn" onclick="window.location.href='/'">Visiter le site</button></div><script src="./bundle.js"></script></body></html>

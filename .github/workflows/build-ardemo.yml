name: Build ardemo

on:
  push:
    branches: [main]
    paths:
      - 'ardemo-src/**'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: ardemo-src/package-lock.json

      - name: Install dependencies
        working-directory: ardemo-src
        run: npm ci

      - name: Build
        working-directory: ardemo-src
        run: npm run build

      - name: Commit built files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add ardemo/
          git diff --staged --quiet || git commit -m "build: ardemo [ci skip]"
          git push
